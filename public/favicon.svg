<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Book cover -->
  <rect x="10" y="8" width="38" height="48" rx="4" fill="#4f46e5"/>
  <!-- Book spine -->
  <rect x="10" y="8" width="6" height="48" rx="2" fill="#3730a3"/>
  <!-- Pages -->
  <rect x="16" y="12" width="28" height="40" rx="2" fill="#fff"/>
  <!-- Lines on pages -->
  <rect x="20" y="20" width="20" height="2.5" rx="1" fill="#c7d2fe"/>
  <rect x="20" y="26" width="20" height="2.5" rx="1" fill="#c7d2fe"/>
  <rect x="20" y="32" width="20" height="2.5" rx="1" fill="#c7d2fe"/>
  <rect x="20" y="38" width="14" height="2.5" rx="1" fill="#c7d2fe"/>
  <!-- Star on cover -->
  <text x="32" y="16" text-anchor="middle" font-size="10" fill="#fbbf24">★</text>
</svg>
